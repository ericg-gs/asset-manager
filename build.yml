name: Build Windows Asset Manager

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PySide6 pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name AssetManager asset_manager.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: AssetManager.exe
          path: dist/AssetManager.exe
